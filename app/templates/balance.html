{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
	<div class="row justify-content-center">
		<div class="col-md-8 col-lg-6">
			<div class="card">
				<div class="card-body">
					<h3 class="card-title mb-3">Manage Account Balance</h3>
					<p class="mb-4">
						Current balance:
						<strong>${{ '%.2f'|format(current_user.balance) }}</strong>
					</p>

					<form method="post" action="{{ url_for('users.balance') }}">
						<div class="form-group">
							<label for="amount">Amount</label>
							<input
								type="text"
								class="form-control"
								id="amount"
								name="amount"
								placeholder="e.g. 25 or 25.50"
								required
								pattern="^\d+(\.\d{1,2})?$"
							>
							<small class="form-text text-muted">
								Enter a non-negative number with at most 2 decimal places.
							</small>
						</div>

						<button type="submit" name="operation" value="add" class="btn btn-success mr-2">Add Funds</button>
						<button type="submit" name="operation" value="withdraw" class="btn btn-danger">Withdraw Funds</button>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock %}
